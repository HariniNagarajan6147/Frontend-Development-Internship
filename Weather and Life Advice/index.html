<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather & Life Advice App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🌦 Weather & Life Advice</h1>
    <p class="subtitle">Good weather outside, good advice inside</p>

    <div class="search">
      <input type="text" id="cityInput" placeholder="Enter city name">
      <button onclick="getWeather()">Search</button>
    </div>

    <div class="weather-card" id="weatherCard">
      <h2 id="city"></h2>
      <p id="temp"></p>
      <p id="desc"></p>
    </div>

    <div class="advice-card">
      <h3>💬 Life Advice</h3>
      <p id="advice">Loading advice...</p>
      <button onclick="getAdvice()">New Advice</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
